name: Monthly mapamundi dataset update

on:
  schedule:
    - cron: "0 5 1 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mapamundi-monthly-update
  cancel-in-progress: false

jobs:
  update-mapamundi:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mapamundi data pipeline
        run: npm run map:update

      - name: Commit and push dataset changes
        run: |
          git add data/mapamundi
          if git diff --cached --quiet; then
            echo "No dataset updates to commit."
            exit 0
          fi
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore(data): monthly mapamundi refresh"
          git pull --rebase origin main
          git push
